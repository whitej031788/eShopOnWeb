$kind: http-request
url: "{{apiBaseUrl}}/api/catalog-items/:catalogItemId"
method: GET
pathVariables:
  catalogItemId: "1"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has JSON content-type', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response wraps a single catalogItem', function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
        pm.expect(json).to.have.property('catalogItem');
        pm.expect(json.catalogItem).to.be.an('object');
      });

      pm.test('Catalog item has the expected shape and matches the requested id', function () {
        const item = pm.response.json().catalogItem;
        ['id', 'name', 'price', 'catalogBrandId', 'catalogTypeId'].forEach(function (key) {
          pm.expect(item).to.have.property(key);
        });
        pm.expect(item.id).to.eql(1);
        pm.expect(item.name).to.be.a('string').and.not.empty;
        pm.expect(item.price).to.be.a('number');
      });
    language: text/javascript
order: 3400
