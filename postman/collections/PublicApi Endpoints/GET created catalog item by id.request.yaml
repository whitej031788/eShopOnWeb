$kind: http-request
url: "{{apiBaseUrl}}/api/catalog-items/:catalogItemId"
method: GET
pathVariables:
  catalogItemId: "{{createdCatalogItemId}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('The just-created item can be read back by id', function () {
        const item = pm.response.json().catalogItem;
        pm.expect(item).to.be.an('object');
        pm.expect(String(item.id)).to.eql(String(pm.collectionVariables.get('createdCatalogItemId')));
        pm.expect(item.name).to.eql(pm.collectionVariables.get('newItemName'));
      });
    language: text/javascript
order: 8700
