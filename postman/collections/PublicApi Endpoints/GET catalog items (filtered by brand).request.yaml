$kind: http-request
url: "{{apiBaseUrl}}/api/catalog-items?pageSize=10&pageIndex=0&catalogBrandId=2"
method: GET
queryParams:
  - key: pageSize
    value: "10"
  - key: pageIndex
    value: "0"
  - key: catalogBrandId
    value: "2"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has JSON content-type', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response body contains catalogItems array and pageCount', function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
        pm.expect(json).to.have.property('catalogItems');
        pm.expect(json.catalogItems).to.be.an('array');
        pm.expect(json).to.have.property('pageCount');
        pm.expect(json.pageCount).to.be.a('number');
      });

      pm.test('The requested brand actually returns items', function () {
        const json = pm.response.json();
        pm.expect(json.catalogItems.length).to.be.above(0);
      });

      pm.test('Every returned item belongs to the requested brand (catalogBrandId=2)', function () {
        const json = pm.response.json();
        json.catalogItems.forEach(function (item) {
          pm.expect(item).to.have.property('catalogBrandId');
          pm.expect(item.catalogBrandId).to.eql(2);
        });
      });
    language: text/javascript
order: 2500
