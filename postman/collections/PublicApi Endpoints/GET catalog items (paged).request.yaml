$kind: http-request
url: "{{apiBaseUrl}}/api/catalog-items?pageSize=10&pageIndex=0"
method: GET
queryParams:
  - key: pageSize
    value: "10"
  - key: pageIndex
    value: "0"
  - key: catalogBrandId
    value: "1"
    disabled: true
  - key: catalogTypeId
    value: "1"
    disabled: true
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has JSON content-type', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response body contains paged catalog wrapper', function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
        pm.expect(json).to.have.property('catalogItems');
        pm.expect(json.catalogItems).to.be.an('array');
      });

      pm.test('Response contains pagination metadata fields', function () {
        const json = pm.response.json();
        ['pageIndex', 'pageSize', 'count'].forEach(function (key) {
          pm.expect(json).to.have.property(key);
          pm.expect(json[key]).to.be.a('number');
        });
      });

      pm.test('Catalog items have expected shape when present', function () {
        const json = pm.response.json();
        if (json.catalogItems.length > 0) {
          json.catalogItems.forEach(function (item) {
            pm.expect(item).to.be.an('object');
            ['id', 'name', 'price'].forEach(function (key) {
              pm.expect(item).to.have.property(key);
            });
            pm.expect(item.id).to.be.a('number');
            pm.expect(item.name).to.be.a('string');
            pm.expect(item.price).to.be.a('number');
          });
        }
      });
    language: text/javascript
order: 2000
