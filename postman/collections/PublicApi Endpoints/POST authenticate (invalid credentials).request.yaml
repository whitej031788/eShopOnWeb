$kind: http-request
url: "{{apiBaseUrl}}/api/authenticate"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "{{userName}}",
      "password": "definitely-not-the-password"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has JSON content-type', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Authentication did not succeed', function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
        pm.expect(json).to.have.property('result');
        pm.expect(json.result).to.eql(false);
      });

      pm.test('No token is issued for invalid credentials', function () {
        const json = pm.response.json();
        pm.expect(json.token === null || json.token === '' || json.token === undefined).to.be.true;
      });
    language: text/javascript
order: 1500
