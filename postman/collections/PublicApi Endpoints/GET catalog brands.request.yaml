$kind: http-request
url: "{{apiBaseUrl}}/api/catalog-brands"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response has JSON content-type', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response body contains catalogBrands wrapper', function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
        pm.expect(json).to.have.property('catalogBrands');
        pm.expect(json.catalogBrands).to.be.an('array');
      });

      pm.test('Each catalog brand has id and name when present', function () {
        const json = pm.response.json();
        if (json.catalogBrands.length > 0) {
          json.catalogBrands.forEach(function (item) {
            pm.expect(item).to.be.an('object');
            pm.expect(item).to.have.property('id');
            pm.expect(item).to.have.property('name');
            pm.expect(item.id).to.be.a('number');
            pm.expect(item.name).to.be.a('string');
          });
        }
      });
    language: text/javascript
order: 4000
