$kind: http-request
url: "{{webBaseUrl}}/"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Response is an HTML page', function () {
        pm.expect(pm.response.headers.get('Content-Type')).to.include('text/html');
      });
    language: text/javascript
order: 1000
